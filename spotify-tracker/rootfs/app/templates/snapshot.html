<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snapshot {{ snap[0] }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1DB954; --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a;
    --border: #2a2a2a; --text: #f0f0f0; --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex; align-items: center; gap: 1rem;
    background: rgba(10,10,10,0.95); backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 100;
  }
  .back { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-family: 'Space Mono', monospace; }
  .back:hover { color: var(--text); }
  header h1 { font-size: 1rem; font-weight: 800; }
  header span { color: var(--green); font-family: 'Space Mono', monospace; font-size: 0.85rem; }
  main { max-width: 900px; margin: 0 auto; padding: 2rem; }
  .meta { display: flex; gap: 2rem; margin-bottom: 2rem; color: var(--muted); font-size: 0.85rem; font-family: 'Space Mono', monospace; }
  .search-bar {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.65rem 1rem; color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 0.82rem; margin-bottom: 1.25rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-bar:focus { border-color: var(--green); }
  .track-list { display: flex; flex-direction: column; gap: 0; }
  .track-row {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border);
    border-radius: 6px; transition: background 0.15s;
  }
  .track-row:hover { background: var(--surface); }
  .track-num { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); width: 2rem; text-align: right; flex-shrink: 0; }
  .track-info { flex: 1; min-width: 0; }
  .track-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-sub { color: var(--muted); font-size: 0.75rem; margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-added { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); flex-shrink: 0; }
</style>
</head>
<body>
<header>
  <a href="{{ ingress_entry }}/" class="back">← back</a>
  <h1>Snapshot</h1>
  <span>{{ snap[0] }}</span>
  <span style="color:var(--muted)">{{ snap[2] }} songs · {{ snap[1] }}</span>
</header>
<main>
  <div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:1.25rem;">
    <input class="search-bar" style="margin-bottom:0;flex:1;" type="text" placeholder="Search tracks…" oninput="filterTracks(this.value)" id="search">
    <button id="dupBtn" onclick="toggleDupes(this)" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:0.6rem 1rem;border-radius:8px;font-family:'Space Mono',monospace;font-size:0.72rem;cursor:pointer;white-space:nowrap;transition:all 0.2s;">Show dupes</button>
  </div>
  <div id="dupe-count" style="display:none;font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--yellow);margin-bottom:0.75rem;"></div>
  <div class="track-list" id="list">
    {% for t in tracks %}
    <div class="track-row" data-name="{{ t[0]|lower }}" data-artist="{{ t[1]|lower }}" data-album="{{ t[2]|lower }}">
      <div class="track-num">{{ loop.index }}</div>
      <div class="track-info">
        <div class="track-name">{{ t[0] }}</div>
        <div class="track-sub">{{ t[1] }} · {{ t[2] }}</div>
      </div>
      <div class="track-added">{{ t[3][:10] if t[3] else '' }}</div>
      {% if t[4] %}
      <a href="https://open.spotify.com/track/{{ t[4] }}" target="_blank" title="Open in Spotify" style="color:var(--green);text-decoration:none;font-size:1.1rem;flex-shrink:0;">▶</a>
      <button onclick="unlikeTrack(this, '{{ t[4] }}')" title="Remove from liked songs" style="background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;flex-shrink:0;padding:0 0.25rem;transition:color 0.2s;" onmouseover="this.style.color='#e05252'" onmouseout="this.style.color='var(--muted)'">♡</button>
      {% endif %}
    </div>
    {% endfor %}
  </div>
</main>
<script>
function filterTracks(q) {
  q = q.toLowerCase();
  const showingDupes = document.getElementById('dupBtn').dataset.active === '1';
  document.querySelectorAll('.track-row').forEach(el => {
    const textMatch = el.dataset.name.includes(q) || el.dataset.artist.includes(q);
    const dupeMatch = !showingDupes || el.dataset.dupe === '1';
    el.style.display = (textMatch && dupeMatch) ? '' : 'none';
  });
}

function toggleDupes(btn) {
  const active = btn.dataset.active === '1';
  if (!active) {
    // Build duplicate map: exact match on name+artist+album
    const counts = {};
    document.querySelectorAll('.track-row').forEach(el => {
      const key = el.dataset.name + '|||' + el.dataset.artist + '|||' + el.dataset.album;
      counts[key] = (counts[key] || 0) + 1;
    });
    let dupeCount = 0;
    document.querySelectorAll('.track-row').forEach(el => {
      const key = el.dataset.name + '|||' + el.dataset.artist + '|||' + el.dataset.album;
      if (counts[key] > 1) {
        el.dataset.dupe = '1';
        el.style.outline = '1px solid rgba(240,192,64,0.3)';
        dupeCount++;
      } else {
        el.dataset.dupe = '0';
        el.style.display = 'none';
      }
    });
    const groups = Object.values(counts).filter(v => v > 1).length;
    document.getElementById('dupe-count').style.display = 'block';
    document.getElementById('dupe-count').textContent = `${dupeCount} duplicate entries across ${groups} track${groups !== 1 ? 's' : ''}`;
    btn.dataset.active = '1';
    btn.style.color = 'var(--yellow)';
    btn.style.borderColor = 'rgba(240,192,64,0.4)';
    btn.textContent = 'Show all';
  } else {
    document.querySelectorAll('.track-row').forEach(el => {
      el.style.display = '';
      el.style.outline = '';
      el.dataset.dupe = '0';
    });
    document.getElementById('dupe-count').style.display = 'none';
    btn.dataset.active = '0';
    btn.style.color = 'var(--muted)';
    btn.style.borderColor = 'var(--border)';
    btn.textContent = 'Show dupes';
  }
}

async function unlikeTrack(btn, spotifyId) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const r = await fetch(`/unlike/${spotifyId}`, { method: 'POST' });
    const d = await r.json();
    if (d.status === 'ok') {
      btn.textContent = '↩';
      btn.title = 'Re-add to liked songs';
      btn.style.color = 'var(--red)';
      btn.style.removeProperty('pointer-events');
      btn.disabled = false;
      btn.onclick = (e) => relikeTrack(btn, spotifyId);
      btn.onmouseover = () => btn.style.color = 'var(--green)';
      btn.onmouseout = () => btn.style.color = 'var(--red)';
      btn.closest('.track-row').style.opacity = '0.4';
    } else {
      btn.textContent = '♡';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = '♡';
    btn.disabled = false;
  }
}

async function relikeTrack(btn, spotifyId) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const r = await fetch(`/relike/${spotifyId}`, { method: 'POST' });
    const d = await r.json();
    if (d.status === 'ok') {
      btn.textContent = '♡';
      btn.title = 'Remove from liked songs';
      btn.style.color = 'var(--muted)';
      btn.disabled = false;
      btn.onclick = (e) => unlikeTrack(btn, spotifyId);
      btn.onmouseover = () => btn.style.color = '#e05252';
      btn.onmouseout = () => btn.style.color = 'var(--muted)';
      btn.closest('.track-row').style.opacity = '1';
    } else {
      btn.textContent = '↩';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = '↩';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
