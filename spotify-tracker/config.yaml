name: "Spotify Liked Songs Tracker"
description: "Tracks your Spotify liked songs weekly and shows what disappeared"
version: "1.0.1"
slug: "spotify_tracker"
init: false
arch:
  - aarch64
  - armv7
  - amd64
  - i386
homeassistant_api: false
ingress: true
ingress_port: 8099
panel_icon: mdi:spotify
panel_title: Spotify Tracker
options:
  spotify_client_id: ""
  spotify_client_secret: ""
  scan_day: "sunday"
  scan_hour: 0
schema:
  spotify_client_id: str
  spotify_client_secret: str
  scan_day: "select(monday,tuesday,wednesday,thursday,friday,saturday,sunday)"
  scan_hour: "int(0,23)"
map:
  - data:rw
