name: "Spotify Liked Songs Tracker"
description: "Tracks your Spotify liked songs weekly and shows what disappeared"
version: "1.0.6"
slug: "spotify-tracker"
arch:
  - aarch64
  - armv7
  - amd64
  - i386
homeassistant_api: false
ingress: true
ingress_port: 8765
panel_icon: mdi:music-note-heart
panel_title: Spotify Tracker
options:
  spotify_client_id: ""
  spotify_client_secret: ""
  scan_day: "sunday"
  scan_hour: 0
schema:
  spotify_client_id: str
  spotify_client_secret: str
  scan_day: list(monday|tuesday|wednesday|thursday|friday|saturday|sunday)
  scan_hour: int(0,23)
map:
  - data:rw
