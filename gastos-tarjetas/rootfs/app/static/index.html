<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos Tarjetas</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <span class="brand">Gastos Tarjetas</span>
    <div class="nav-right">
      <span id="user-email"></span>
      <a href="/auth/logout">Salir</a>
    </div>
  </nav>

  <main class="container">

    <!-- Monthly chart -->
    <div class="chart-card">
      <div class="chart-title">Movimientos ARS — mes a mes</div>
      <canvas id="monthly-chart"></canvas>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="gastos">Gastos</button>
      <button class="tab" data-tab="upload">Importar</button>
      <button class="tab" data-tab="rules">Reglas</button>
    </div>

    <!-- Tab: Gastos -->
    <section id="tab-gastos" class="tab-content active">

      <div class="filter-bar">
        <div id="gastos-summary"></div>
        <button id="btn-toggle-filters" class="btn btn-sm" aria-expanded="true">Filtros ▴</button>
      </div>

      <div id="filter-panel">
        <div class="filters">
          <select id="filter-fuente">
            <option value="">Todas las fuentes</option>
            <option value="amex">AMEX</option>
            <option value="bbva_mc">BBVA Mastercard</option>
            <option value="bbva_visa">BBVA Visa</option>
            <option value="bbva_cuenta">BBVA Cuenta</option>
            <option value="galicia_mc">Galicia Mastercard</option>
            <option value="mercadopago">MercadoPago</option>
          </select>
          <select id="filter-usuario">
            <option value="">Todos</option>
            <option value="Seba">Seba</option>
            <option value="Mada">Mada</option>
          </select>
          <select id="filter-mes">
            <option value="">Todos los meses</option>
          </select>
          <button id="btn-load" class="btn">Cargar</button>
          <button id="btn-export" class="btn">Exportar Excel</button>
        </div>
        <div class="cat-slicer">
          <span class="cat-label">Categorías:</span>
          <div id="cat-chips">
            <span class="cat-chip cat-todos active" onclick="toggleAllCats()">Todas</span>
          </div>
        </div>
      </div>

      <div class="table-wrap">
        <table id="gastos-table">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Descripción</th>
              <th>Monto</th>
              <th>Mon.</th>
              <th>Fuente</th>
              <th>Usuario</th>
              <th>Categoría</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="gastos-body"></tbody>
        </table>
      </div>
    </section>

    <!-- Tab: Upload -->
    <section id="tab-upload" class="tab-content">
      <div class="upload-card">
        <h2>Importar archivo</h2>
        <div class="form-group">
          <label>Fuente</label>
          <select id="upload-fuente">
            <option value="amex">AMEX Platinum (PDF)</option>
            <option value="bbva_mc">BBVA Mastercard (PDF)</option>
            <option value="bbva_visa">BBVA Visa (PDF)</option>
            <option value="bbva_cuenta">BBVA Cuenta (PDF)</option>
            <option value="galicia_mc">Galicia Mastercard (PDF)</option>
            <option value="mercadopago">MercadoPago (XLSX)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Archivo</label>
          <input type="file" id="upload-file" accept=".pdf,.xls,.xlsx" />
        </div>
        <button id="btn-upload" class="btn btn-primary">Importar</button>
        <div id="upload-result"></div>
      </div>
    </section>

    <!-- Tab: Rules -->
    <section id="tab-rules" class="tab-content">
      <div class="rules-header">
        <h2>Reglas de categorización</h2>
        <button id="btn-add-rule" class="btn">+ Nueva regla</button>
        <button id="btn-save-rules" class="btn btn-primary">Guardar</button>
      </div>
      <p class="rules-hint">Escribí una palabra y presioná Enter para agregarla. La regla aplica si alguna palabra aparece en la descripción del gasto.</p>
      <div id="rules-list"></div>
    </section>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
